<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dua 23 - Dua Sharing</title>
</head>
<body>
  <a id="manualLink" href="#" target="_blank" style="display:none;">Open WhatsApp</a>

  <script>
    const message = `*By Your Mercy, Ya Kareem… grant us Jannah*

Pause for a moment, turn your heart sincerely toward Allah, and read this short duʿāʾ for easy entry into Jannatul Firdows Al A’la. Then forward it to 5 people to earn ongoing reward and duʿā.

*Niyyah*:

I intend this recitation of this du'a for myself, the compilers, the sharers, and the recipients.

*The Duʿāʾ*:

Ya Allah (O Allah), Ya Rahman (O Most Merciful), Ya Kareem (O Most Generous), by Your infinite mercy and generosity, grant us easy entry into Jannahtul Firdows Al A’la, the highest and most blessed level of paradise, which is reserved for the best of the believers and Your Awliyah (Friends). Ya Allah, despite our shortcomings, we ask You to grant us this highest station in Jannah solely by Your boundless mercy and generosity, without the need for hardship, suffering, grief, or sadness, either in this life or the next. Let our entry be one of joy, relief, and eternal peace, where we experience the perfection of Your blessings and everlasting comfort, in the company of Your beloved Habeebullah, Sultan-ul-Anbiya, Rasulullah, Sayyidina Muhammad Sallallahu Alayhi Wasallam, along with our family and loved ones.

Because of the niyyah, when others recite this after you share it, you are included in their duʿāʾ. They will be praying for easy entry into Jannatul Firdows Al A’la for you too.

This is 1 of 23 supplications from *The Supplication of Infinite Blessings*.

*Take a few seconds now and forward this to at least 5 people* — so the reward of spreading goodness increases for you, and duʿāʾs continue to be made for you with every sincere recitation.

Find the full Supplication of Infinite Blessings in both English and Arabic at: https://www.duasharing.com/`;

    const fallbacks = {
      'ﷻ': 'ﷻ',
      'ﷺ': 'ﷺ'
    };

    let messageWithFallback = message;
    for (const [symbol, replacement] of Object.entries(fallbacks)) {
      messageWithFallback = messageWithFallback.replace(new RegExp(symbol, 'g'), replacement);
    }

    const encodedText = encodeURIComponent(messageWithFallback);
    const waProtocol = "whatsapp://send?text=" + encodedText;
    const waWeb = "https://wa.me/?text=" + encodedText;

    const manualLink = document.getElementById('manualLink');
    manualLink.href = waWeb;

    async function tryShare() {
      try {
        if (navigator.share) {
          await navigator.share({ text: messageWithFallback });
        } else {
          window.location.href = waProtocol;
          setTimeout(() => { window.location.href = waWeb; }, 1200);
        }
      } catch (err) {
        window.location.href = waWeb;
      }
    }

    window.addEventListener('load', tryShare);
  </script>
</body>
</html>
